name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Verify build output
        run: test -f out/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

      - name: Cancel stuck Pages deployments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for sha in "${{ github.sha }}" "${{ github.event.before }}"; do
            if [ -z "$sha" ] || [ "$sha" = "0000000000000000000000000000000000000000" ]; then
              continue
            fi
            echo "Cancelling any stuck deployment for ${sha}"
            gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/deployments/${sha}/cancel" || true
          done
          sleep 20

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
