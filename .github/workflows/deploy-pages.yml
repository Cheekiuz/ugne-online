name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_BUY_ME_A_COFFEE_URL: https://buymeacoffee.com/leugne
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

      - name: Upload site bundle
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: out
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-gh-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download site bundle
        uses: actions/download-artifact@v6
        with:
          name: site
          path: out

      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ github.token }}
          publish_dir: ./out
          force_orphan: true

  notify-search-engines:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Wait for live site
        run: |
          for i in {1..12}; do
            if curl -fsS "https://ugne.online/52c99c8c23d62861b4b1acf14ee1e9ba.txt" | grep -q "52c99c8c23d62861b4b1acf14ee1e9ba"; then
              echo "IndexNow key file is live."
              exit 0
            fi
            echo "Waiting for deployment to propagate ($i/12)..."
            sleep 10
          done
          echo "Timed out waiting for IndexNow key file."
          exit 1

      - name: Submit URLs to IndexNow
        run: node scripts/submit-indexnow.mjs
