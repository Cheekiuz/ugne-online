name: Lint workflows

on:
  pull_request:
    paths:
      - .github/workflows/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/**

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1
